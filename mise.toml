min_version = "2024.9.5"

[settings]
python.uv_venv_auto = "source"

[env]
_.python.venv = { path = ".venv", create = true }

[tools]
python = "{{ get_env(name='PYTHON_VERSION', default='3.12') }}"
uv = "latest"

[tasks.install]
description = "Install dependencies"
run = "uv sync"

[tasks.test]
description = "Run tests"
run = "uv run pytest"

[tasks.format]
description = "Format code with ruff"
run = "uv run ruff format tests src"

[tasks.lint]
description = "Lint code with ruff"
run = "uv run ruff check tests src"

[tasks.coverage]
description = "Run coverage report"
run = [
    "uv run coverage run --source shellcraft -m pytest",
    "uv run coverage report -m",
    "uv run coverage html",
]

[tasks.docs]
description = "Build documentation"
run = "uv run mkdocs build --clean"

[tasks.servedocs]
description = "Serve documentation locally"
run = "uv run mkdocs serve"

[tasks.build]
description = "Build source and wheel package"
depends = ["clean"]
run = "uv build"

[tasks.clean]
description = "Remove build, test, and Python artifacts"
run = """
rm -rf build/ dist/ .eggs/ pip-wheel-metadata/ site/ .tox/ htmlcov/ .coverage
find . -name '*.pyc' -delete
find . -name '*.pyo' -delete
find . -name '__pycache__' -exec rm -rf {} +
"""

[tasks.backup]
description = "Copy the current savegame to config.json.bak"
run = """
SAVE=$(uv run python -c "import click, os; print(os.path.join(click.get_app_dir('ShellCraft'), 'config.json'))")
if [ ! -f "$SAVE" ]; then
    echo "No savegame at $SAVE" >&2
    exit 1
fi
cp "$SAVE" "$SAVE.bak"
echo "Backed up $SAVE -> $SAVE.bak"
"""

[tasks.restore]
description = "Restore the savegame from config.json.bak"
run = """
SAVE=$(uv run python -c "import click, os; print(os.path.join(click.get_app_dir('ShellCraft'), 'config.json'))")
if [ ! -f "$SAVE.bak" ]; then
    echo "No backup at $SAVE.bak" >&2
    exit 1
fi
cp "$SAVE.bak" "$SAVE"
echo "Restored $SAVE from $SAVE.bak"
"""
